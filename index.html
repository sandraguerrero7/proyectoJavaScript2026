<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <title> Aplicación </title>
</head>
<body>

    <div class="container">
        <div class="row">
            <h1> Sistema de Empleados </h1>
        </div>

        <div class="row">
            <div class="col-9">
                <form action="">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="name">
                    </div>
                    <div class="mb-3">
                        <label for="lastname" class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="lastname">
                    </div>

                    <div class="mb-3">
                        <label for="gender" class="form-label">Género</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="female" checked value="Femenino">
                            <label class="form-check-label" > Femenino </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="Masculino">
                            <label class="form-check-label" > Masculino </label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="birthday" class="form-label">Fecha de nacimiento</label>
                        <input type="date" class="form-control" id="birthday" name="birthday" >
                    </div>

                    <div class="mb-3">
                        <label for="date_entry" class="form-label">Fecha de ingreso</label>
                        <input type="date" class="form-control" id="date_entry" name="date_entry">
                    </div>

                    <div class="mb-3">
                        <label for="salary" class="form-label">Salario</label>
                        <input type="number" class="form-control" id="salary" name="salary">                       
                    </div>

                    <div class="mb-3">
                        <button type="button" class="btn btn-success" onclick="ingresarDep()">Ingresar Dependencia</button>
                        <button type="button" class="btn btn-primary" onclick="calcularEdad()">Calcular Edad</button>
                        <button type="button" class="btn btn-danger" onclick="calcularAnt()">Calcular Antiguedad</button>
                        <button type="button" class="btn btn-secondary" onclick="calcularPres()">Calcular Prestaciones</button>
                    </div>
                </form>
            </div>

            <div class="col-3">
                <div class="card">
                    <img src="https://images.pexels.com/photos/4467687/pexels-photo-4467687.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" class="card-img-top" alt="...">
                    <div class="alert alert-primary" role="alert">
                       <b> <p id="text_department"> Departamento: </p> </b> 
                    </div>
                    <div class="card-body" align="center">
                        <button type="button" class="btn btn-warning" onclick="verInfo()"> Ver Información</button> 
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" tabindex="-1" id="infoModal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Información Personal</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="modal-name"></p> <!-- Aquí se mostrará el nombre -->
                <p id="modal-lastname"></p> <!-- Aquí se mostrará el apellido -->
                <p id="modal-gender"></p> <!-- Aquí se mostrará el genero -->
                <p id="modal-birthday"></p> <!-- Aquí se mostrará la fecha de nacimiento -->
                <p id="modal-date_entry"></p> <!-- Aquí se mostrará la fecha de ingreso -->
                <p id="modal-salary"></p> <!-- Aquí se mostrará el salario -->
            </div>
          </div>
        </div>
    </div>

    <script src="js/functions.js"></script>
</body>
</html>
